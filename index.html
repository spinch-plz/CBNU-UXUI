<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CBNU UXUI 프로젝트</title>
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f5f5f5; }
    .card { background: #fff; border-radius: 16px; padding: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; max-width: 400px; width: 90%; }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    p { color: #666; margin-bottom: 24px; }
    a.btn { display: inline-block; background: #24292f; color: #fff; padding: 12px 28px; border-radius: 8px; text-decoration: none; font-weight: bold; margin-bottom: 24px; }
    a.btn:hover { background: #444; }
    img.qr { width: 180px; height: 180px; border: 1px solid #eee; border-radius: 8px; }
    .qr-label { font-size: 0.85rem; color: #999; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>CBNU UXUI 프로젝트</h1>
    <p>충북대학교 UX/UI 수업 실습 파일</p>
    <a class="btn" href="https://github.com/spinch-plz/CBNU-UXUI/archive/refs/heads/main.zip">ZIP 다운로드</a>
    <br />
    <img class="qr" src="qr-download.png" alt="QR 코드" />
    <div class="qr-label">QR 코드로 다운로드</div>
  </div>
</body>
</html>
